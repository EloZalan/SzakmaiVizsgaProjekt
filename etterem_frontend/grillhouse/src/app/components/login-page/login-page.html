<div class="login-shell">
  <div class="login-card">
    <h1 class="login-card__title">Login</h1>

    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" novalidate>
      <label class="login-field">
        <span>Email</span>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          #emailRef="ngModel"
          required
          email
          placeholder="pelda@email.com"
        />

        @if (emailRef.touched && emailRef.invalid) {
          <small class="error">
            @if (emailRef.errors?.['required']) {
              <span>Az email megadása kötelező.</span>
            }
            @if (emailRef.errors?.['email']) {
              <span>Az email formátuma hibás.</span>
            }
          </small>
        }
      </label>

      <label class="login-field">
        <span>Password</span>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          #passwordRef="ngModel"
          required
          placeholder="******"
        />

        @if (passwordRef.touched && passwordRef.invalid) {
          <small class="error">
            @if (passwordRef.errors?.['required']) {
              <span>A jelszó megadása kötelező.</span>
            }

          </small>
        }
      </label>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button
        class="gh-btn gh-btn--primary gh-btn--block"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? 'Bejelentkezés...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
